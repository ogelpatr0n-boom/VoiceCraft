  <rect x="174" y="410" width="14" height="58" rx="7" fill="#00d4ff" opacity="0.75"/>
  <rect x="196" y="420" width="14" height="48" rx="7" fill="#00d4ff" opacity="0.6"/>
  <rect x="302" y="420" width="14" height="48" rx="7" fill="#7c3aed" opacity="0.6"/>
  <rect x="324" y="408" width="14" height="60" rx="7" fill="#7c3aed" opacity="0.75"/>
  <rect x="346" y="396" width="14" height="72" rx="7" fill="#7c3aed" opacity="0.85"/>
  <rect x="368" y="410" width="14" height="58" rx="7" fill="#7c3aed" opacity="0.75"/>
